<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 65" width="100%">
<defs>
<style>
.r{animation:run 5s linear infinite}
.fa{animation:fa .32s step-end infinite}
.fb{animation:fb .32s step-end infinite}
@keyframes run{
  0%  {transform:translate(-80px,0)}
  38% {transform:translate(340px,0)}
  44% {transform:translate(385px,-28px)}
  50% {transform:translate(430px,0)}
  100%{transform:translate(980px,0)}
}
@keyframes fa{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes fb{0%,49%{opacity:0}50%,100%{opacity:1}}
</style>
</defs>
<!-- obstacle bug -->
<text x="400" y="60" font-size="18" font-family="serif">🐛</text>
<!-- runner -->
<g class="r">
  <!-- head -->
  <circle cx="20" cy="9" r="7" fill="#e94560"/>
  <!-- torso -->
  <line x1="20" y1="16" x2="20" y2="34" stroke="#e94560" stroke-width="4" stroke-linecap="round"/>
  <!-- frame A: right stride -->
  <g class="fa">
    <line x1="20" y1="21" x2="34" y2="16" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="21" x2="8"  y2="28" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="34" x2="30" y2="52" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="34" x2="10" y2="48" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- frame B: left stride -->
  <g class="fb">
    <line x1="20" y1="21" x2="8"  y2="16" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="21" x2="34" y2="28" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="34" x2="10" y2="52" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="34" x2="30" y2="48" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
  </g>
</g>
</svg>
