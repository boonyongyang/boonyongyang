name: Generate Donut

on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/donut.yml'
      - 'scripts/donut.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install fonts
        run: sudo apt-get install -y fonts-dejavu-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate donut GIFs
        run: python scripts/donut.py

      - name: Commit GIFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/donut-dark.gif assets/donut-light.gif
          git diff --staged --quiet || git commit -m "chore: update donut animation"
          git pull --rebase origin main
          git push
